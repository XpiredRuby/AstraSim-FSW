name: Full Verification

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  full-verification:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ python3 python3-pip
          python3 -m pip install pyyaml

      - name: Run full verification suite
        id: verification
        run: python3 tools/run_all_scenarios.py

      - name: Generate provenance manifest
        if: always()
        run: |
          status=failed
          if [ "${{ steps.verification.outcome }}" = "success" ]; then
            status=passed
          fi
          python3 tools/generate_baseline_manifest.py \
            --output reports/latest/baseline_manifest.json \
            --verification-status "$status" \
            --test-command "python3 tools/run_all_scenarios.py" \
            --build-type Release \
            --warnings-as-errors \
            --note "Generated by the Full Verification GitHub Actions workflow."

      - name: Upload verification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: astra-os-full-verification-${{ github.run_id }}
          path: |
            reports/
            evidence/
            dist/
          if-no-files-found: warn
          retention-days: 30
