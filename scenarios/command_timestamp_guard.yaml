name: command_timestamp_guard
description: Verify stale and future ground-command timestamps are rejected before a current command is accepted.
requirements:
  - FSW-REQ-115
  - FSW-REQ-112
  - FSW-REQ-113
  - VER-REQ-002
command_port: 6011
telemetry_port: 5011
loop_count: 30
steps:
  - name: reject stale command
    command: SET_MODE
    argument: NOMINAL
    timestamp_offset_ms: -7000
    expect:
      ack_seq: 1
      ack_cmd: SET_MODE
      ack_status: REJECTED_STALE_TIMESTAMP
      mode: BOOT
      fault: NONE
  - name: reject future command
    command: SET_MODE
    argument: NOMINAL
    timestamp_offset_ms: 2000
    expect:
      ack_seq: 2
      ack_cmd: SET_MODE
      ack_status: REJECTED_FUTURE_TIMESTAMP
      mode: BOOT
      fault: NONE
  - name: accept current command
    command: SET_MODE
    argument: NOMINAL
    expect:
      ack_seq: 3
      ack_cmd: SET_MODE
      ack_status: ACCEPTED
      mode: NOMINAL
      fault: NONE
